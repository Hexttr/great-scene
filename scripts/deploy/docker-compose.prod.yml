# Production Postgres for great-scene only. Binds localhost to avoid clashing with superava (5433).
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-greatscene}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-greatscene}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - greatscene_pg:/var/lib/postgresql/data

volumes:
  greatscene_pg:
